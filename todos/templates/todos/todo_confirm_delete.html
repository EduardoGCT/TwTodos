{% extends "base.html" %}

{% block page_title %}
    Excluir Tarefa
{% endblock page_title %}

{% block content %}
    <div class="tw-card" style="max-width: 500px;">
        <h1 class="mb-3">
            <i class="bi bi-trash3 me-2" style="color: #dc2626;"></i>Excluir Tarefa?
        </h1>

        <p style="color: var(--text-muted);">
            Tem certeza que deseja excluir a tarefa <strong style="color: var(--text-primary);">({{ todo.pk }}): {{ todo.title }}</strong>?
            <br><small>Esta ação não pode ser desfeita.</small>
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash3 me-1"></i>Excluir
                </button>
                <a href="{% url "todo_list" %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Cancelar
                </a>
            </div>
        </form>
    </div>
{% endblock content %}
