<!doctype html>
<html lang="pt-br" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>TWTodos - {% block page_title %}{% endblock page_title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      :root {
        --bg-primary: #f5f0ff;
        --bg-secondary: #ffffff;
        --bg-surface: #ede9fe;
        --text-primary: #1e1b4b;
        --text-secondary: #4c1d95;
        --text-muted: #6b7280;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --accent-light: #ede9fe;
        --border-color: #ddd6fe;
        --navbar-bg: #120524;
        --navbar-text: #f5f0ff;
        --shadow: 0 4px 20px rgba(109, 40, 217, 0.12);
        --shadow-sm: 0 2px 8px rgba(109, 40, 217, 0.08);
        --badge-high-bg: #dc2626;
        --badge-mid-bg: #d97706;
        --badge-low-bg: #059669;
        --table-hover-bg: #f3eeff;
        --row-overdue-bg: #fff1f2;
        --row-overdue-border: #fca5a5;
        --input-bg: #ffffff;
        --input-border: #ddd6fe;
        --btn-outline-border: var(--accent);
        --btn-outline-text: var(--accent);
        --btn-outline-hover-bg: var(--accent);
        --btn-outline-hover-text: #ffffff;
        --transition: 0.25s ease;
      }

      [data-theme="dark"] {
        --bg-primary: #0a0a12;
        --bg-secondary: #12121e;
        --bg-surface: #1a1828;
        --text-primary: #e9e4f8;
        --text-secondary: #c4b5fd;
        --text-muted: #9ca3af;
        --accent: #9f6ef5;
        --accent-hover: #8b5cf6;
        --accent-light: #2d1b69;
        --border-color: #2d1b69;
        --navbar-bg: #07070f;
        --navbar-text: #e9e4f8;
        --shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
        --shadow-sm: 0 2px 8px rgba(139, 92, 246, 0.15);
        --badge-high-bg: #dc2626;
        --badge-mid-bg: #b45309;
        --badge-low-bg: #047857;
        --table-hover-bg: #1e1a30;
        --row-overdue-bg: #2a0f1a;
        --row-overdue-border: #7f1d1d;
        --input-bg: #1a1828;
        --input-border: #3b2d6b;
        --btn-outline-border: var(--accent);
        --btn-outline-text: var(--accent);
        --btn-outline-hover-bg: var(--accent);
        --btn-outline-hover-text: #ffffff;
      }

      *, *::before, *::after {
        transition: background-color var(--transition), border-color var(--transition), color var(--transition), box-shadow var(--transition);
      }

      html, body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      /* Navbar */
      .tw-navbar {
        background-color: var(--navbar-bg);
        box-shadow: 0 2px 16px rgba(0,0,0,0.4);
        padding: 0.75rem 1.5rem;
      }

      .tw-navbar .navbar-brand {
        color: var(--navbar-text);
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: 0.04em;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .tw-navbar .navbar-brand .brand-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }

      /* Theme toggle button */
      #theme-toggle {
        background: transparent;
        border: 1.5px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: var(--navbar-text);
        cursor: pointer;
        padding: 0.35rem 0.65rem;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        transition: border-color 0.2s, background 0.2s;
      }

      #theme-toggle:hover {
        background: rgba(255,255,255,0.1);
        border-color: var(--accent);
      }

      /* Main container */
      main.container {
        padding-top: 1.5rem;
        padding-bottom: 3rem;
      }

      /* Page headings */
      h1 {
        font-weight: 700;
        color: var(--text-primary);
        font-size: 1.8rem;
        margin-bottom: 1.25rem;
      }

      /* Cards */
      .tw-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        box-shadow: var(--shadow-sm);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      /* Alerts */
      .alert {
        border-radius: 10px;
        border: none;
        font-weight: 500;
      }

      .alert-success {
        background-color: color-mix(in srgb, #059669 15%, var(--bg-secondary));
        color: #059669;
        border-left: 4px solid #059669;
      }

      .alert-secondary {
        background-color: var(--bg-surface);
        color: var(--text-muted);
        border-left: 4px solid var(--border-color);
      }

      /* Table */
      .table {
        color: var(--text-primary);
        border-color: var(--border-color);
      }

      .table thead.tw-thead th {
        background-color: var(--navbar-bg);
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border-bottom: 2px solid var(--accent);
        padding: 0.85rem 1rem;
        white-space: nowrap;
      }

      .table tbody tr {
        border-bottom: 1px solid var(--border-color);
      }

      .table tbody tr:hover {
        background-color: var(--table-hover-bg);
      }

      .table tbody td, .table tbody th {
        padding: 0.75rem 1rem;
        vertical-align: middle;
        border-color: var(--border-color);
      }

      .tw-overdue {
        background-color: var(--row-overdue-bg) !important;
        border-left: 3px solid var(--row-overdue-border);
      }

      .table-responsive {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
      }

      /* Buttons */
      .btn {
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.45rem 1rem;
        transition: all 0.18s ease;
      }

      .btn-primary {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn-primary:hover, .btn-primary:focus {
        background-color: var(--accent-hover);
        border-color: var(--accent-hover);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
      }

      .btn-secondary {
        background-color: var(--bg-surface);
        border-color: var(--border-color);
        color: var(--text-primary);
      }

      .btn-secondary:hover {
        background-color: var(--accent-light);
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-outline-primary {
        border-color: var(--accent);
        color: var(--accent);
        background: transparent;
      }

      .btn-outline-primary:hover {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn-outline-secondary {
        border-color: var(--border-color);
        color: var(--text-muted);
        background: transparent;
      }

      .btn-outline-secondary:hover {
        background-color: var(--bg-surface);
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-outline-success {
        border-color: #059669;
        color: #059669;
        background: transparent;
      }

      .btn-outline-success:hover {
        background-color: #059669;
        border-color: #059669;
        color: #fff;
      }

      .btn-danger {
        background-color: #dc2626;
        border-color: #dc2626;
        color: #fff;
      }

      .btn-danger:hover {
        background-color: #b91c1c;
        border-color: #b91c1c;
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25);
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Form controls */
      .form-control, .form-select {
        background-color: var(--input-bg);
        border-color: var(--input-border);
        color: var(--text-primary);
        border-radius: 8px;
        padding: 0.5rem 0.85rem;
      }

      .form-control:focus, .form-select:focus {
        background-color: var(--input-bg);
        border-color: var(--accent);
        color: var(--text-primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        outline: none;
      }

      .form-control::placeholder {
        color: var(--text-muted);
        opacity: 0.7;
      }

      .form-select option {
        background-color: var(--bg-secondary);
        color: var(--text-primary);
      }

      /* Labels */
      label {
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 0.3rem;
      }

      /* Badges */
      .badge {
        font-weight: 600;
        font-size: 0.72rem;
        padding: 0.35em 0.65em;
        border-radius: 6px;
        letter-spacing: 0.03em;
      }

      /* Pagination */
      .pagination .page-link {
        background-color: var(--bg-secondary);
        border-color: var(--border-color);
        color: var(--accent);
        border-radius: 8px;
        margin: 0 2px;
      }

      .pagination .page-link:hover {
        background-color: var(--accent-light);
        border-color: var(--accent);
        color: var(--accent);
      }

      .pagination .page-item.disabled .page-link {
        background-color: var(--bg-surface);
        border-color: var(--border-color);
        color: var(--text-muted);
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-primary); }
      ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
  </head>
  <body>
    <nav class="tw-navbar navbar mb-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="{% url "todo_list" %}">
                <span class="brand-dot"></span>
                TWTodos
            </a>
            <button id="theme-toggle" aria-label="Alternar tema">
                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                <span id="theme-label">Claro</span>
            </button>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      (function () {
        const html = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const label = document.getElementById('theme-label');

        const saved = localStorage.getItem('tw-theme') || 'dark';
        applyTheme(saved);

        btn.addEventListener('click', function () {
          const current = html.getAttribute('data-theme');
          applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        function applyTheme(theme) {
          html.setAttribute('data-theme', theme);
          localStorage.setItem('tw-theme', theme);
          if (theme === 'dark') {
            icon.className = 'bi bi-moon-stars-fill';
            label.textContent = 'Claro';
          } else {
            icon.className = 'bi bi-sun-fill';
            label.textContent = 'Escuro';
          }
        }
      })();
    </script>
  </body>
</html>
